# Render Blueprint: New → Blueprint → connect this repo.
# When prompted, set only MONGODB_URI and JWT_SECRET (Atlas + a random string).
services:
  - type: web
    name: rental-platform
    runtime: node
    plan: free
    branch: master
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRE
        value: 7d
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
