<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Detail - Rental Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #fafafa; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .property-detail { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
        .main-content { }
        .sidebar { position: sticky; top: 24px; }
        .image-gallery { width: 100%; height: 400px; background: linear-gradient(135deg, #e3f2fd, #bbdefb); border-radius: 12px; margin-bottom: 24px; }
        .property-title { font-size: 32px; font-weight: 700; margin-bottom: 16px; }
        .property-info { display: flex; gap: 24px; margin-bottom: 24px; }
        .info-item { display: flex; align-items: center; gap: 8px; }
        .booking-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
        .price { font-size: 32px; font-weight: 700; color: #1976d2; margin-bottom: 16px; }
        .btn-book { width: 100%; background: #1976d2; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; }
        .amenities { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .amenity-item { display: flex; align-items: center; gap: 8px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="property-detail">
            <div class="main-content">
                <div class="image-gallery">
                    <i class="material-icons" style="font-size: 64px;">image</i>
                </div>
                <h1 class="property-title">Luxury Beach Villa</h1>
                <div class="property-info">
                    <div class="info-item">
                        <i class="material-icons">location_on</i>
                        <span>Miami, FL</span>
                    </div>
                    <div class="info-item">
                        <i class="material-icons">people</i>
                        <span>8 guests</span>
                    </div>
                    <div class="info-item">
                        <i class="material-icons">star</i>
                        <span>4.5 (18 reviews)</span>
                    </div>
                </div>
                <div class="amenities">
                    <div class="amenity-item">
                        <i class="material-icons">wifi</i>
                        <span>WiFi</span>
                    </div>
                    <div class="amenity-item">
                        <i class="material-icons">pool</i>
                        <span>Pool</span>
                    </div>
                    <div class="amenity-item">
                        <i class="material-icons">kitchen</i>
                        <span>Kitchen</span>
                    </div>
                    <div class="amenity-item">
                        <i class="material-icons">local_parking</i>
                        <span>Parking</span>
                    </div>
                </div>
            </div>
            <div class="sidebar">
                <div class="booking-card">
                    <div class="price">$250/night</div>
                    <button class="btn-book">Book Now</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
