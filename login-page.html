<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rental Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #fafafa; min-height: 100vh; }
        .container { max-width: 400px; margin: 0 auto; padding: 48px 24px; }
        .auth-card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 32px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { color: #1976d2; font-size: 32px; font-weight: 700; }
        .form-group { margin-bottom: 24px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        .form-input { width: 100%; padding: 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        .form-input:focus { outline: none; border-color: #1976d2; }
        .btn-primary { width: 100%; background: #1976d2; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; }
        .btn-primary:hover { background: #1565c0; }
        .divider { text-align: center; margin: 24px 0; color: #666; }
        .link { color: #1976d2; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="logo">
                <h1>Rental Platform</h1>
            </div>
            <h2 style="margin-bottom: 24px;">Sign In</h2>
            <form>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="Enter your password">
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" style="width: auto;">
                        <span>Remember me</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
                <div class="divider">
                    Don't have an account? <a href="#" class="link">Sign up</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
